<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP 智能生活助手</title>
  <style>
    body {
      font-family: Arial, "Microsoft YaHei", sans-serif;
      margin: 0;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      padding: 24px 28px;
      background: #1f3a8a;
      color: white;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    .header p {
      margin: 0;
      opacity: 0.9;
    }

    .body {
      padding: 24px 28px;
    }

    .examples {
      margin-bottom: 20px;
      padding: 16px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
    }

    .examples h3 {
      margin-top: 0;
      font-size: 16px;
    }

    .examples ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .chat-box {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      min-height: 360px;
      max-height: 520px;
      overflow-y: auto;
      padding: 16px;
      background: #fafafa;
      white-space: pre-wrap;
    }

    .msg {
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.6;
    }

    .user {
      background: #dbeafe;
    }

    .assistant {
      background: #ecfdf5;
    }

    .error {
      background: #fef2f2;
      color: #991b1b;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    textarea {
      flex: 1;
      resize: vertical;
      min-height: 72px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      font-family: inherit;
    }

    button {
      width: 120px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .meta {
      margin-top: 8px;
      font-size: 13px;
      color: #64748b;
    }

    .footer-tip {
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>MCP 智能生活助手</h1>
      <p>最小可运行网页版：待办、天气、出行、文件操作、多步骤任务</p>
    </div>

    <div class="body">
      <div class="examples">
        <h3>你可以直接输入这些命令：</h3>
        <ul>
          <li>查询东京天气</li>
          <li>规划东京明天出行</li>
          <li>添加待办：明天下午三点开组会</li>
          <li>查看未完成待办</li>
          <li>创建文件 notes/today.txt 内容：今天要写作业</li>
          <li>读取文件 notes/today.txt</li>
          <li>帮我查询东京天气并规划明天出行</li>
          <li>帮我查询上海天气并写入文件 reports/weather.txt</li>
        </ul>
      </div>

      <div id="chatBox" class="chat-box"></div>

      <div class="input-row">
        <textarea id="messageInput" placeholder="请输入自然语言命令..."></textarea>
        <button id="sendBtn">发送</button>
      </div>

      <div class="footer-tip">
        提示：这是本地网页前端，后端会调用你的 MCP Server。
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");

    function appendMessage(role, text, extra = "") {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;

      if (extra) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = extra;
        div.appendChild(document.createElement("br"));
        div.appendChild(meta);
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;

      appendMessage("user", "你：\n" + message);
      messageInput.value = "";
      sendBtn.disabled = true;

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        if (data.ok) {
          const toolInfo =
            "调用工具: " + data.tool_name + " | 参数: " + JSON.stringify(data.arguments, null, 2);
          appendMessage("assistant", "助手：\n" + data.result, toolInfo);
        } else {
          appendMessage("error", "错误：\n" + data.error);
        }
      } catch (err) {
        appendMessage("error", "错误：\n前端请求失败：" + err);
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
